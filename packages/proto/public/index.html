<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Miami Heat - Team Page</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/tokens.css">
    <link rel="stylesheet" href="styles/page.css">
</head>
<body>
    <header class="app-header">
        <div class="team-brand">
            <h1>
                <svg class="icon"><use href="/icons/nba.svg#icon-basketball" /></svg>
                Miami Heat
            </h1>
        </div>
        <nav class="app-nav">
            <a href="player.html">Roster</a>
            <a href="game.html">Schedule</a>
            <label class="theme-toggle">
                <input type="checkbox" autocomplete="off" />
                Light mode
            </label>
        </nav>
    </header>

    <div class="page-container">
        
        <aside class="sidebar">
            <h3>Quick Stats</h3>
            <ul>
                <li>Record: 42-20</li>
                <li>Streak: W5</li>
                <li>Conference: 2nd in East</li>
            </ul>
        </aside>

        <main class="content-area">
            <heat-roster src="/data/team.json"></heat-roster>
        </main>
        
    </div>
    <script type="importmap">
    {
        "imports": {
            "@unbndl/html": "https://unpkg.com/@unbndl/html"
        }
    }
    </script>
    <script type="module">
        import { define } from "@unbndl/html";
        import { HeatCardElement } from "/scripts/components/heat-card.js";
        import { HeatRosterElement } from "/scripts/components/heat-roster.js";

        define({
            "heat-card": HeatCardElement,
            "heat-roster": HeatRosterElement
        });
    </script>
    <script type="module" src="scripts/darkmode.js"></script>
</body>
</html>
