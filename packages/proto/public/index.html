<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Miami Heat - Team Page</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/tokens.css">
    <link rel="stylesheet" href="styles/page.css">
</head>
<body>
    <auth-provider>
        <heat-header></heat-header>

        <div class="page-container">
            
            <aside class="sidebar">
                <h3>Quick Stats</h3>
                <ul>
                    <li>Record: 42-20</li>
                    <li>Streak: W5</li>
                    <li>Conference: 2nd in East</li>
                </ul>
            </aside>

            <main class="content-area">
                <heat-roster src="/api/team"></heat-roster>
            </main>
            
        </div>
    </auth-provider>
    <script type="importmap">
    {
        "imports": {
            "@unbndl/auth": "https://unpkg.com/@unbndl/auth",
            "@unbndl/html": "https://unpkg.com/@unbndl/html",
            "@unbndl/view": "https://unpkg.com/@unbndl/view"
        }
    }
    </script>
    <script type="module">
        import { define } from "@unbndl/html";
        import { Auth } from "@unbndl/auth";
        import { HeatCardElement } from "/scripts/components/heat-card.js";
        import { HeatRosterElement } from "/scripts/components/heat-roster.js";
        import { HeatHeaderElement } from "/scripts/components/heat-header.js";

        define({
            "auth-provider": Auth.Provider,
            "heat-header": HeatHeaderElement,
            "heat-card": HeatCardElement,
            "heat-roster": HeatRosterElement
        });
    </script>

</body>
</html>
