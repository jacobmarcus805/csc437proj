<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Bam Adebayo - Player Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/tokens.css">
    <link rel="stylesheet" href="styles/page.css">
</head>
<body>
    <header class="app-header">
        <div class="team-brand">
            <h1>
                <svg class="icon"><use href="/icons/nba.svg#icon-basketball" /></svg>
                Miami Heat
            </h1>
        </div>
        <nav class="app-nav">
            <a href="index.html">Team Home</a>
            <a href="game.html">Schedule</a>
            <label class="theme-toggle">
                <input type="checkbox" autocomplete="off" />
                Light mode
            </label>
        </nav>
    </header>

    <div class="page-container">
        <aside class="sidebar">
            <h3>Player Stats</h3>
            <ul>
                <li>Position: Center</li>
                <li>Height: 6'9"</li>
                <li>PPG: 19.3</li>
                <li>RPG: 10.4</li>
            </ul>
        </aside>

        <main class="content-area">
            <heat-card icon="icon-jersey">
                <span slot="heading">Bam Adebayo (#13)</span>
                <p slot="body">Bam Adebayo is a core player for the Miami Heat, known for his elite defense and playmaking ability.</p>
            </heat-card>

            <heat-card>
                <span slot="heading">Recent Activity</span>
                <p slot="body">Participates in: <a href="game.html">Game vs. Lakers</a></p>
            </heat-card>
        </main>
    </div>
    <script type="importmap">
    {
        "imports": {
            "@unbndl/html": "https://unpkg.com/@unbndl/html"
        }
    }
    </script>
    <script type="module">
        import { define } from "@unbndl/html";
        import { HeatCardElement } from "/scripts/components/heat-card.js";

        define({
            "heat-card": HeatCardElement
        });
    </script>
    <script type="module" src="scripts/darkmode.js"></script>
</body>
</html>
